# packages/agent-tools/Cargo.toml
[package]
name = "agent-tools"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "agent-tools"

[dependencies]
uiautomation = { version = "0.25.0", features = ["screenshot"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
reqwest = { version = "0.12", features = ["blocking", "multipart", "json"] }
image = "0.25"
screenshots = "0.8"
xcap = "0.4"